services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aisec
      POSTGRES_PASSWORD: aisec
      POSTGRES_DB: aisec
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisec"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  enterprise-assist:
    build:
      context: .
      dockerfile: apps/enterprise-assist/Dockerfile
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ENTERPRISE_ASSIST_LOCAL_URL: http://enterprise-assist:8090
      DATABASE_URL: postgresql+psycopg://aisec:aisec@postgres:5432/aisec
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      enterprise-assist:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:
