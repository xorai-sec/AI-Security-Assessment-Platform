[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/frameworks/validate_adaptive_planner.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
explicit_package_bases = true
ignore_errors = true
strict = false

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
